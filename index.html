<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://media.base44.com/images/public/user_67da72445efe4064f012cd35/52b6212d8_image.png" />

    <!-- Viewport: respect device notch / safe areas -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / App manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS / Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Hanoo" />
    <link rel="apple-touch-icon" href="https://media.base44.com/images/public/user_67da72445efe4064f012cd35/52b6212d8_image.png" />

    <!-- Android / Chrome -->
    <meta name="theme-color" content="#007AFF" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0A1628" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Color scheme: tells WebView which modes are supported -->
    <meta name="color-scheme" content="light dark" />

    <!-- SEO -->
    <meta name="description" content="Hanoo Community — שיתוף חניות חכם בין שכנים" />

    <!-- Prevent phone number detection -->
    <meta name="format-detection" content="telephone=no" />

    <title>Hanoo Community</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
